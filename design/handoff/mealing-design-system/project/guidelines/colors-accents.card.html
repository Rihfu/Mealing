<!-- @dsCard group="Colors" viewport="760x210" name="Vivid accents — points of interest" subtitle="Rare, signal-only: CTA, consume-soon, expired, delete. -strong = AA text-on-surface" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--color-paper);font-family:var(--font-sans);color:var(--color-ink);padding:24px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{width:118px}
  .chip{height:60px;border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:6px 8px;box-sizing:border-box}
  .chip span{font-size:11px;font-weight:700;color:#fff}
  .name{font-weight:700;font-size:12px;margin-top:7px}
  .hex{font-size:11px;color:var(--color-ink-soft);font-variant-numeric:tabular-nums;text-transform:uppercase}
  .role{font-size:11px;color:var(--color-ink-soft)}
</style></head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--color-green)"></div><div class="name">--color-green</div><div class="hex">#45A35E · frais</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-green-strong)"><span>Aa</span></div><div class="name">--color-green-strong</div><div class="hex">#2F8049 · texte</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-yellow)"></div><div class="name">--color-yellow</div><div class="hex">#F4C430 · focus</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-orange)"></div><div class="name">--color-orange</div><div class="hex">#EF8A3C · à consommer</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-red)"></div><div class="name">--color-red</div><div class="hex">#DD5240 · périmé</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-red-strong)"><span>Aa</span></div><div class="name">--color-red-strong</div><div class="hex">#C23E2E · texte</div></div>
  </div>
</body></html>
