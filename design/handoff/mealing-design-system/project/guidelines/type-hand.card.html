<!-- @dsCard group="Type" viewport="760x170" name="Handwritten accent — Caveat" subtitle="Playful labels only (screen titles, empty states). Never body text" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--color-paper);font-family:var(--font-sans);color:var(--color-ink);padding:24px;display:flex;gap:40px;align-items:center;flex-wrap:wrap}
  .hand{font-family:var(--font-hand);font-size:34px;color:var(--color-sage-deep);font-weight:600}
  .hand.warm{color:var(--color-clay)}
  .note{font-size:12px;color:var(--color-ink-soft);max-width:240px}
</style></head><body>
  <div class="hand">fait maison&nbsp;!</div>
  <div class="hand warm">rien ne se perd</div>
  <div class="note">Usage parcimonieux : touches manuscrites pour humaniser un titre ou un état vide. Jamais en paragraphe.</div>
</body></html>
