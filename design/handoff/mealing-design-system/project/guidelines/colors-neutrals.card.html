<!-- @dsCard group="Colors" viewport="760x190" name="Neutrals — paper & ink" subtitle="Warm cream surfaces, warm near-black ink — never pure white/black" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--color-paper);font-family:var(--font-sans);color:var(--color-ink);padding:24px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{width:148px}
  .chip{height:64px;border-radius:var(--radius-md);border:1px solid var(--color-line)}
  .name{font-weight:700;font-size:13px;margin-top:8px}
  .hex{font-size:12px;color:var(--color-ink-soft);font-variant-numeric:tabular-nums;text-transform:uppercase}
</style></head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--color-paper)"></div><div class="name">--color-paper</div><div class="hex">#FBF7EF</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-surface)"></div><div class="name">--color-surface</div><div class="hex">#FFFDFA</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-line)"></div><div class="name">--color-line</div><div class="hex">#E7E0D2</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-ink)"></div><div class="name">--color-ink</div><div class="hex">#34322C</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-ink-soft)"></div><div class="name">--color-ink-soft</div><div class="hex">#6F6B61</div></div>
  </div>
</body></html>
