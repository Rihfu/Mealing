<!-- @dsCard group="Type" viewport="760x230" name="Type scale" subtitle="Modular rem scale · xs .75 → 4xl 2.5" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--color-paper);font-family:var(--font-sans);color:var(--color-ink);padding:20px 24px}
  table{border-collapse:collapse;width:100%;max-width:680px}
  td{padding:4px 0;vertical-align:baseline}
  .tok{font-size:12px;color:var(--color-ink-soft);font-weight:700;width:110px;font-variant-numeric:tabular-nums}
  .px{font-size:12px;color:var(--color-ink-soft);width:70px}
  .spec{font-family:var(--font-display);font-weight:600;color:var(--color-ink);white-space:nowrap}
</style></head><body>
  <table>
    <tr><td class="tok">--text-xs</td><td class="px">12px</td><td><span class="spec" style="font-size:12px">Mealing</span></td></tr>
    <tr><td class="tok">--text-sm</td><td class="px">14px</td><td><span class="spec" style="font-size:14px">Mealing</span></td></tr>
    <tr><td class="tok">--text-base</td><td class="px">16px</td><td><span class="spec" style="font-size:16px">Mealing</span></td></tr>
    <tr><td class="tok">--text-lg</td><td class="px">18px</td><td><span class="spec" style="font-size:18px">Mealing</span></td></tr>
    <tr><td class="tok">--text-xl</td><td class="px">20px</td><td><span class="spec" style="font-size:20px">Mealing</span></td></tr>
    <tr><td class="tok">--text-2xl</td><td class="px">24px</td><td><span class="spec" style="font-size:24px">Mealing</span></td></tr>
    <tr><td class="tok">--text-3xl</td><td class="px">30px</td><td><span class="spec" style="font-size:30px">Mealing</span></td></tr>
    <tr><td class="tok">--text-4xl</td><td class="px">40px</td><td><span class="spec" style="font-size:40px">Mealing</span></td></tr>
  </table>
</body></html>
