<!-- @dsCard group="Spacing" viewport="760x200" name="Shadows" subtitle="Low, warm-tinted (ink @ low alpha) — never hard" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--color-paper);font-family:var(--font-sans);color:var(--color-ink);padding:30px 24px}
  .row{display:flex;gap:36px;flex-wrap:wrap}
  .item{display:flex;flex-direction:column;align-items:center;gap:12px}
  .box{width:120px;height:64px;background:var(--color-surface);border-radius:var(--radius-lg)}
  .tok{font-size:12px;font-weight:700;color:var(--color-ink-soft)}
</style></head><body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="tok">--shadow-sm</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="tok">--shadow-md</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="tok">--shadow-lg</div></div>
  </div>
</body></html>
