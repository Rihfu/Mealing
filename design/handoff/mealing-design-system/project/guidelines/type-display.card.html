<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--color-paper);font-family:var(--font-display);color:var(--color-ink);padding:24px}
  .meta{font-family:var(--font-sans);font-size:11px;color:var(--color-ink-soft);margin-bottom:2px}
  .a{font-size:40px;font-weight:600;letter-spacing:-.01em;line-height:1.05}
  .b{font-size:24px;font-weight:600;margin-top:14px}
  .c{font-size:18px;font-weight:500;margin-top:12px}
</style></head><body>
  <div class="meta">40 / 600 · titre d'écran</div>
  <div class="a">Qu'est-ce qu'on mange&nbsp;?</div>
  <div class="meta" style="margin-top:14px">24 / 600 · section</div>
  <div class="b">Cette semaine au foyer</div>
  <div class="meta" style="margin-top:12px">18 / 500 · sous-titre</div>
  <div class="c">Planifié ensemble, sans gaspiller</div>
</body></html>
