<!-- @dsCard group="Colors" viewport="760x250" name="Muted base — the ambience" subtitle="Sage, butter, clay + tints. Calm pastel foundation; use freely for fills & headers" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--color-paper);font-family:var(--font-sans);color:var(--color-ink);padding:24px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{width:118px}
  .chip{height:60px;border-radius:var(--radius-md);border:1px solid var(--color-line)}
  .name{font-weight:700;font-size:12px;margin-top:7px}
  .hex{font-size:11px;color:var(--color-ink-soft);font-variant-numeric:tabular-nums;text-transform:uppercase}
</style></head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--color-sage)"></div><div class="name">--color-sage</div><div class="hex">#9CBE96</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-sage-tint)"></div><div class="name">--color-sage-tint</div><div class="hex">#DCE8D4</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-sage-deep)"></div><div class="name">--color-sage-deep</div><div class="hex">#5E7E58</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-butter)"></div><div class="name">--color-butter</div><div class="hex">#E9DFA3</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-butter-tint)"></div><div class="name">--color-butter-tint</div><div class="hex">#F5EFCF</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-clay)"></div><div class="name">--color-clay</div><div class="hex">#D9A98C</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-clay-tint)"></div><div class="name">--color-clay-tint</div><div class="hex">#F0DDD0</div></div>
  </div>
</body></html>
