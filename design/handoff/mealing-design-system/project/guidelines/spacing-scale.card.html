<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--color-paper);font-family:var(--font-sans);color:var(--color-ink);padding:24px}
  .row{display:flex;align-items:flex-end;gap:20px;flex-wrap:wrap}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--color-sage);border-radius:4px;height:40px}
  .tok{font-size:11px;font-weight:700;color:var(--color-ink-soft)}
  .px{font-size:11px;color:var(--color-ink-soft)}
</style></head><body>
  <div class="row">
    <div class="item"><div class="bar" style="width:4px"></div><div class="tok">space-1</div><div class="px">4</div></div>
    <div class="item"><div class="bar" style="width:8px"></div><div class="tok">space-2</div><div class="px">8</div></div>
    <div class="item"><div class="bar" style="width:12px"></div><div class="tok">space-3</div><div class="px">12</div></div>
    <div class="item"><div class="bar" style="width:16px"></div><div class="tok">space-4</div><div class="px">16</div></div>
    <div class="item"><div class="bar" style="width:24px"></div><div class="tok">space-6</div><div class="px">24</div></div>
    <div class="item"><div class="bar" style="width:32px"></div><div class="tok">space-8</div><div class="px">32</div></div>
    <div class="item"><div class="bar" style="width:48px"></div><div class="tok">space-12</div><div class="px">48</div></div>
    <div class="item"><div class="bar" style="width:64px"></div><div class="tok">space-16</div><div class="px">64</div></div>
  </div>
</body></html>
